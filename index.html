<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제현승 자기소개</title>
    <style>
  body {
    background-color: black;
    color: white;
  }

  h1 {
    color: lime;
  }

  h2 {
    color: deepskyblue;
  }
</style>
</head>
<body>
     <h1>제현승의 자기소개</h1>

  <p>안녕하세요. 스마트보안솔루션과 제현승입니다.</p>

  <p>현재 프로그래밍과 웹 개발을 배우고 있는 학생입니다.</p>

  <p>아직 부족하지만 다양한 기술을 배우기 위해 노력하고 있습니다.</p>
  <hr>

  <h2>취미</h2>

  <ul>
    <li>게임</li>
    <li>영화 보기</li>
    <li>운동</li>
  </ul>
    
  <p>게임과 영화를 좋아하며, 평소 컴퓨터 관련 분야에도 관심이 많습니다.</p>

  <hr>

  <h2>목표</h2>

  <p>앞으로 웹 개발과 보안 분야에 대해 더 많이 배우고 싶습니다.</p>

  <hr>

  <p>아직 부족하지만 열심히 배우겠습니다.</p>
    
  <p>잘 부탁드립니다</p>

</body>
</html>
